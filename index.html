<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator">
        <div class="display">TESTING</div>
        <div class="buttonArea">
            <button>⌫</button>
            <button>AC</button>
            <button>%</button>
            <button>÷</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>×</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>-</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>+</button>
            <button><sup>+</sup>&frasl;-</button> <!--FIX HOW THIS LOOKS - This button is for changing the sign of the number--> 
            <button>0</button>
            <button>.</button>
            <button class="operationButton">=</button>
        </div>
    </div>
</body>
</html>
